pre-commit:
  commands:
    go-fmt:
      glob: "*.go"
      run: gofmt -l {staged_files} | grep . && exit 1 || exit 0
    go-vet:
      glob: "*.go"
      run: go vet ./...
    go-build:
      run: go build ./...

pre-push:
  commands:
    no-push-to-main:
      run: |
        branch=$(git symbolic-ref HEAD | sed 's|refs/heads/||')
        if [ "$branch" = "main" ]; then
          echo "直接 main へのプッシュは禁止されています。"
          exit 1
        fi
