shell: bash

pre-commit:
  commands:
    go-fmt:
      glob: "**/*.go"
      run: bash lefthook/pre-commit/check-gofmt.sh {staged_files}
    go-vet:
      glob: "**/*.go"
      run: go vet ./...
    go-build:
      run: go build ./...

pre-push:
  commands:
    no-push-to-main:
      run: bash lefthook/pre-push/no-push-to-main.sh
