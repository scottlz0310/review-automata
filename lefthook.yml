pre-commit:
  commands:
    go-fmt:
      glob: "*.go"
      run: gofmt -l {staged_files} | grep . && exit 1 || exit 0
    go-vet:
      glob: "*.go"
      run: go vet ./...
    go-build:
      run: go build ./...

pre-push:
  commands:
    no-push-to-main:
      run: sh -c 'b=$(git symbolic-ref HEAD 2>/dev/null | sed "s|refs/heads/||"); [ "$b" = "main" ] && echo "直接 main へのプッシュは禁止されています。" && exit 1 || exit 0'
