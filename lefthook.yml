shell: bash

pre-commit:
  commands:
    go-fmt:
      glob: "*.go"
      run: gofmt -l {staged_files} | grep . && exit 1 || exit 0
    go-vet:
      glob: "*.go"
      run: go vet ./...
    go-build:
      run: go build ./...

pre-push:
  commands:
    no-push-to-main:
      run: bash lefthook/pre-push/no-push-to-main.sh
